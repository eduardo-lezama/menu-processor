# pyproject.toml - Configuración de herramientas de desarrollo
# Menu Processor Service

[tool.ruff]
# Versión de Python objetivo
target-version = "py311"

# Longitud máxima de línea
line-length = 100

# Archivos/carpetas a excluir
exclude = [
    "venv",
    ".venv",
    "__pycache__",
    ".git",
    "*.pyc",
]

[tool.ruff.lint]
# Reglas habilitadas
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort (imports)
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade
]

# Reglas ignoradas
ignore = [
    "E501",   # line too long (manejado por formatter)
    "B008",   # function call in default argument (común en Flask)
]

[tool.ruff.lint.per-file-ignores]
# run.py puede tener imports después de código
"run.py" = ["E402"]

[tool.ruff.lint.isort]
# Ordenar imports al estilo Google
known-first-party = ["app"]

[tool.ruff.format]
# Usar comillas dobles
quote-style = "double"

# Indentar con espacios
indent-style = "space"

[tool.pytest.ini_options]
# Configuración de pytest
testpaths = ["tests"]
python_files = ["test_*.py", "*_test.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
