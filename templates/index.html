<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Processor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍽️</text></svg>">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            /* Paleta Verde/Ocre — Consistente con Intranet */
            --bg-primary: #0E1A1A;
            --bg-secondary: #132222;
            --bg-card: #162828;
            --bg-tertiary: #1C2F2F;
            --text-primary: #F4F4F4;
            --text-secondary: #C8D0D0;
            --text-muted: #8FA5A5;
            --accent: #E4981E;
            --accent-hover: #B97A16;
            --accent-light: #F2C46A;
            --success: #4ADE80;
            --warning: #FACC15;
            --error: #EF4444;
            --info: #38BDF8;
            --border: rgba(255, 255, 255, 0.08);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --radius-sm: 0.5rem;
            --radius-md: 0.75rem;
            --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            background: linear-gradient(135deg, var(--accent) 0%, var(--bg-card) 50%, var(--bg-primary) 100%);
            margin: -2rem -2rem 2rem -2rem;
            padding: 1.5rem 2rem;
            border-radius: 0;
        }

        h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            background: var(--success);
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--bg-card);
            border-radius: var(--radius-md);
            padding: 1.5rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        .card h2 {
            font-size: 1rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .menu-list {
            list-style: none;
        }

        .menu-item {
            padding: 0.75rem;
            border-radius: 6px;
            margin-bottom: 0.5rem;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:hover {
            background: var(--bg-tertiary);
            transform: translateX(4px);
        }

        .menu-item.selected {
            background: var(--bg-tertiary);
            border-left: 3px solid var(--accent);
        }

        .menu-item-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .menu-item-name {
            font-weight: 500;
        }

        .menu-item-meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition-base);
            font-weight: 500;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-primary:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .filters {
            margin-bottom: 1rem;
        }

        .filter-group {
            margin-bottom: 0.75rem;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
            padding: 0.25rem 0.5rem;
            background: var(--bg-secondary);
            border-radius: 4px;
        }

        .checkbox-item input {
            accent-color: var(--accent);
            cursor: pointer;
        }

        .checkbox-item:hover {
            background: var(--bg-tertiary);
        }

        .ingredients-preview {
            max-height: 300px;
            overflow-y: auto;
            background: var(--bg-secondary);
            border-radius: 6px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .ingredients-list {
            list-style: none;
            columns: 2;
            column-gap: 1rem;
        }

        .ingredients-list li {
            padding: 0.25rem 0;
            font-size: 0.875rem;
            break-inside: avoid;
        }

        .result-message {
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            display: none;
        }

        .result-message.success {
            background: rgba(74, 222, 128, 0.15);
            border: 1px solid var(--success);
            display: block;
        }

        .result-message.error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--error);
            display: block;
        }

        .result-message a {
            color: var(--accent);
        }

        .loading {
            display: none;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .loading.show {
            display: flex;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .input-group input {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.875rem;
        }

        .checkbox-item {
            transition: var(--transition-base);
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                <i class="bi bi-journal-text"></i>
                Menu Processor
            </h1>
            <span class="status-badge" id="status">Conectado</span>
        </header>

        <div class="grid">
            <!-- Panel izquierdo: Lista de menús -->
            <div class="card">
                <h2><i class="bi bi-folder2-open"></i> Menús disponibles</h2>
                
                <ul class="menu-list" id="menuList">
                    <li class="empty-state">Cargando menús...</li>
                </ul>

                <button class="btn btn-secondary" onclick="loadMenus()" style="margin-top: 1rem;">
                    <i class="bi bi-arrow-clockwise"></i> Actualizar
                </button>
            </div>

            <!-- Panel derecho: Acciones -->
            <div class="card">
                <h2><i class="bi bi-cart3"></i> Generar lista de compra</h2>

                <div id="noMenuSelected" class="empty-state">
                    <i class="bi bi-arrow-left" style="font-size: 2rem;"></i>
                    <p>Selecciona un menú para continuar</p>
                </div>

                <div id="menuActions" style="display: none;">
                    <div class="input-group">
                        <label for="listName">Nombre de la lista en Mealie</label>
                        <input type="text" id="listName" placeholder="Ej: Compra Gener 2026">
                    </div>

                    <div class="filters">
                        <div class="filter-group">
                            <label>Filtrar por días</label>
                            <div class="checkbox-group" id="daysFilter">
                                <label class="checkbox-item">
                                    <input type="checkbox" value="DILLUNS" checked> Dilluns
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="DIMARTS" checked> Dimarts
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="DIMECRES" checked> Dimecres
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="DIJOUS" checked> Dijous
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="DIVENDRES" checked> Divendres
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="DISSABTE" checked> Dissabte
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="DIUMENGE" checked> Diumenge
                                </label>
                            </div>
                        </div>

                        <div class="filter-group">
                            <label>Filtrar por comidas</label>
                            <div class="checkbox-group" id="mealsFilter">
                                <label class="checkbox-item">
                                    <input type="checkbox" value="dinar" checked> Dinar
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="sopar" checked> Sopar
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="esmorzar"> Esmorzar
                                </label>
                                <label class="checkbox-item">
                                    <input type="checkbox" value="berenar"> Berenar
                                </label>
                            </div>
                        </div>
                    </div>

                    <div style="display: flex; gap: 0.5rem;">
                        <button class="btn btn-secondary" onclick="previewIngredients()">
                            <i class="bi bi-eye"></i> Previsualizar
                        </button>
                        <button class="btn btn-primary" onclick="generateShoppingList()" id="generateBtn">
                            <i class="bi bi-cart-plus"></i> Generar en Mealie
                        </button>
                    </div>

                    <div class="loading" id="loading">
                        <div class="spinner"></div>
                        <span>Procesando...</span>
                    </div>

                    <div class="ingredients-preview" id="ingredientsPreview" style="display: none;">
                        <h3 style="margin-bottom: 0.5rem; font-size: 0.875rem;">
                            <i class="bi bi-list-check"></i> 
                            Ingredientes (<span id="ingredientCount">0</span>)
                        </h3>
                        <ul class="ingredients-list" id="ingredientsList"></ul>
                    </div>

                    <div class="result-message" id="resultMessage"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedMenu = null;

        async function loadMenus() {
            const list = document.getElementById('menuList');
            list.innerHTML = '<li class="empty-state"><div class="spinner"></div> Cargando...</li>';

            try {
                const response = await fetch('/api/menus');
                const data = await response.json();

                if (data.menus && data.menus.length > 0) {
                    list.innerHTML = data.menus.map(menu => `
                        <li class="menu-item" onclick="selectMenu('${menu.filename}', this)">
                            <div class="menu-item-info">
                                <span class="menu-item-name">${menu.filename}</span>
                                <span class="menu-item-meta">
                                    ${menu.source} · ${menu.period || 'Sin período'}
                                </span>
                            </div>
                            <i class="bi bi-chevron-right"></i>
                        </li>
                    `).join('');
                } else {
                    list.innerHTML = `
                        <li class="empty-state">
                            <i class="bi bi-inbox" style="font-size: 2rem;"></i>
                            <p>No hay menús disponibles</p>
                            <p style="font-size: 0.75rem;">Sube un JSON a la carpeta /data</p>
                        </li>
                    `;
                }
            } catch (error) {
                list.innerHTML = `
                    <li class="empty-state" style="color: var(--error);">
                        <i class="bi bi-exclamation-triangle"></i>
                        Error cargando menús
                    </li>
                `;
                console.error('Error loading menus:', error);
            }
        }

        function selectMenu(filename, element) {
            selectedMenu = filename;
            
            // Update UI
            document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            
            document.getElementById('noMenuSelected').style.display = 'none';
            document.getElementById('menuActions').style.display = 'block';
            document.getElementById('ingredientsPreview').style.display = 'none';
            document.getElementById('resultMessage').className = 'result-message';
            
            // Set default list name
            const baseName = filename.replace('.json', '').replace(/_/g, ' ');
            document.getElementById('listName').value = `Compra - ${baseName}`;
        }

        function getSelectedFilters() {
            const days = Array.from(document.querySelectorAll('#daysFilter input:checked'))
                .map(cb => cb.value);
            const meals = Array.from(document.querySelectorAll('#mealsFilter input:checked'))
                .map(cb => cb.value);
            return { days, meals };
        }

        async function previewIngredients() {
            if (!selectedMenu) return;

            const { days, meals } = getSelectedFilters();
            const params = new URLSearchParams();
            days.forEach(d => params.append('days', d));
            meals.forEach(m => params.append('meals', m));

            document.getElementById('loading').classList.add('show');
            document.getElementById('ingredientsPreview').style.display = 'none';

            try {
                const response = await fetch(`/api/menus/${selectedMenu}/preview-ingredients?${params}`);
                const data = await response.json();

                if (data.ingredients) {
                    document.getElementById('ingredientCount').textContent = data.total_ingredients;
                    document.getElementById('ingredientsList').innerHTML = 
                        data.ingredients.map(ing => `<li>• ${ing}</li>`).join('');
                    document.getElementById('ingredientsPreview').style.display = 'block';
                }
            } catch (error) {
                console.error('Error previewing ingredients:', error);
                showResult('Error al previsualizar ingredientes', 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
            }
        }

        async function generateShoppingList() {
            if (!selectedMenu) return;

            const { days, meals } = getSelectedFilters();
            const listName = document.getElementById('listName').value.trim();

            if (!listName) {
                showResult('Por favor, introduce un nombre para la lista', 'error');
                return;
            }

            document.getElementById('loading').classList.add('show');
            document.getElementById('generateBtn').disabled = true;

            try {
                const response = await fetch('/api/generate-shopping-list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        filename: selectedMenu,
                        list_name: listName,
                        days: days,
                        meals: meals
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showResult(`
                        <strong>✓ Lista creada correctamente</strong><br>
                        ${data.items_added} ingredientes añadidos<br>
                        <a href="${data.mealie_url}" target="_blank">Abrir en Mealie →</a>
                    `, 'success');
                } else {
                    showResult(`Error: ${data.error}`, 'error');
                }
            } catch (error) {
                console.error('Error generating list:', error);
                showResult('Error de conexión al generar la lista', 'error');
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('generateBtn').disabled = false;
            }
        }

        function showResult(message, type) {
            const el = document.getElementById('resultMessage');
            el.innerHTML = message;
            el.className = `result-message ${type}`;
        }

        // Check health and load menus on start
        async function init() {
            try {
                const response = await fetch('/api/health');
                const data = await response.json();
                document.getElementById('status').textContent = 'Conectado';
                document.getElementById('status').style.background = 'var(--success)';
            } catch (error) {
                document.getElementById('status').textContent = 'Desconectado';
                document.getElementById('status').style.background = 'var(--error)';
            }
            
            loadMenus();
        }

        init();
    </script>
</body>
</html>
